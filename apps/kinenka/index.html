<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- favicon / アイコン -->
    <link rel="icon" href="../../assets/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="../../assets/favicon-32.png" sizes="32x32" />
    <link rel="apple-touch-icon" href="../../assets/apple-touch-icon.png" />
    <link rel="manifest" href="../../site.webmanifest" />
    <meta name="theme-color" content="#171716" />
    <!-- OGP -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="misoclub" />
    <meta property="og:image" content="../../assets/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>キネンカ をダウンロード | misoclub</title>
    <meta
      name="description"
      content="キネンカ 〜たいせつな日のカウントダウン〜 を App Store / Google Play からダウンロードできます。"
    />
    <link rel="stylesheet" href="../../css/style.css" />
  </head>
  <body>
    <!--
      アプリのシェア機能などから飛ばすダウンロード専用ページ。
      iOS / Android を選んでダウンロードしてもらう。
      misoclub の他アプリ一覧へのリンク以外は置かない。
      ↓ ストアの URL を実際のものに差し替えてください（href="#" の箇所）。
    -->
    <main class="dl-page">
      <img
        src="./splash.jpg"
        alt="キネンカ 〜たいせつな日のカウントダウン〜"
        class="dl-splash"
      />

      <h1>キネンカ 〜たいせつな日のカウントダウン〜</h1>
      <p class="dl-desc">お使いの端末を選んでダウンロード</p>

      <div class="store-badges">
        <!-- iOS / App Store -->
        <a href="https://apps.apple.com/app/id6786140094" aria-label="App Store でダウンロード">
          <img src="../../assets/app-store-badge.svg" alt="App Store でダウンロード" />
        </a>

        <!-- Android / Google Play -->
        <a href="https://play.google.com/store/apps/details?id=com.misoclub.memoria" aria-label="Google Play で手に入れよう">
          <img src="../../assets/google-play-badge.png" alt="Google Play で手に入れよう" />
        </a>
      </div>

      <p class="dl-others">
        <a href="../">misoclub の他のアプリを見る →</a>
      </p>
    </main>
  </body>
</html>
