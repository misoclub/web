<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- favicon / アイコン -->
    <link rel="icon" href="./assets/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="./assets/favicon-32.png" sizes="32x32" />
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" />
    <link rel="manifest" href="./site.webmanifest" />
    <meta name="theme-color" content="#171716" />
    <!-- OGP -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="misoclub" />
    <meta property="og:image" content="./assets/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>misoclub</title>
    <meta name="description" content="misoclub は〇〇なアプリをつくるチームです。" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <!-- ヘッダー -->
    <header class="site-header">
      <div class="container">
        <a href="./index.html" class="brand"
          ><img src="./assets/logo.png" alt="misoclub" class="brand-logo"
        /></a>
      </div>
    </header>

    <!-- ヒーロー -->
    <section class="hero">
      <div class="container">
        <h1>misoclub</h1>
        <p>
          ここにキャッチコピーが入ります。<br />
          misoclub がつくるアプリやサービスを紹介するランディングページです。
        </p>
      </div>
    </section>

    <!-- アプリ（各カードから個別のDLページへ） -->
    <section id="apps">
      <div class="container">
        <h2 class="section-title">アプリ</h2>
        <p class="section-lead">misoclub がリリースしているアプリ。</p>

        <div class="app-list">
          <a class="app-card app-card-link" href="./apps/nihon-tabinikki/index.html">
            <img
              class="app-icon"
              src="./apps/nihon-tabinikki/icon.png"
              alt="日本旅日記 アイコン"
              width="96"
              height="96"
            />
            <div class="app-info">
              <h3>日本旅日記</h3>
              <p>旅の行き先・日程・写真・メモを、端末内だけに記録できる旅日記アプリ。</p>
              <span class="app-cta">ダウンロード →</span>
            </div>
          </a>

          <a class="app-card app-card-link" href="./apps/memoria/index.html">
            <img
              class="app-icon"
              src="./apps/memoria/icon.png"
              alt="メモリア アイコン"
              width="96"
              height="96"
            />
            <div class="app-info">
              <h3>メモリア 〜たいせつな日のカウントダウン〜</h3>
              <p>記念日や大切な日までの日数を、絵文字や通知とともにカウントダウン。</p>
              <span class="app-cta">ダウンロード →</span>
            </div>
          </a>
        </div>

        <p style="text-align: center; margin-top: 32px">
          <a href="./apps/index.html" class="btn btn-outline">アプリ一覧を見る</a>
        </p>
      </div>
    </section>

    <!-- フッター -->
    <footer class="site-footer">
      <div class="container">
        <p>&copy; <span id="year"></span> misoclub</p>
      </div>
    </footer>

    <script>
      // フッターの年号を自動更新
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
